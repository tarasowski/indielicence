name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -Xswiftc -warnings-as-errors

      - name: Swift tests (library, CLI, shared vectors)
        run: swift test

      - name: JS verifier against shared vectors
        run: node --test Tests/verify.test.mjs

      - name: Vectors are reproducible from the generator
        run: |
          node Tools/make-vectors.mjs > /tmp/vectors.json
          diff Tests/vectors.json /tmp/vectors.json

      - name: End-to-end demo
        run: Examples/demo.sh

      - name: No network calls anywhere in the codebase
        run: |
          ! rg -n -g '*.swift' -g '*.mjs' \
            'URLSession|NSURLConnection|CFNetwork|import Network|NW(Connection|Listener|Path)|node:(http|https|net|tls|dgram|dns)|\b(fetch|WebSocket|socket|connect|getaddrinfo)\s*\(|\b(curl|wget)\b' \
            Sources Verifier
